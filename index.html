<style>
  :root{--paper:#F5F2EC;--card:#FBFAF6;--ink:#1B1916;--soft:#615B50;--faint:#928B7E;--line:#E0DACE;--accent:#9C3B2E}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--paper);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
  .card{width:100%;max-width:340px;text-align:center}
  .eyebrow{font-weight:600;text-transform:uppercase;letter-spacing:.22em;font-size:11px;color:var(--accent)}
  h1{font-family:Georgia,"Times New Roman",serif;font-weight:400;font-size:52px;letter-spacing:-.02em;margin:8px 0 2px}
  .sub{font-family:Georgia,serif;font-style:italic;color:var(--soft);font-size:16px;margin-bottom:30px}
  form{display:flex;flex-direction:column;gap:12px;align-items:center}
  input[type=password],input[type=text]{width:100%;font:inherit;font-size:22px;text-align:center;letter-spacing:.5em;padding:14px 16px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--ink);outline:none}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(156,59,46,.10)}
  button{width:100%;font:inherit;font-weight:600;font-size:16px;padding:14px;border:none;border-radius:12px;background:var(--ink);color:var(--paper);cursor:pointer;transition:background .2s}
  button:hover{background:#000}
  button:disabled{opacity:.55;cursor:default}
  .rem{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--soft);margin-top:2px}
  .rem input{width:auto}
  .err{color:var(--accent);font-size:13.5px;min-height:18px;font-weight:500}
  .hint{color:var(--faint);font-size:12px;margin-top:22px;line-height:1.5}
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Summer '26</div>
    <h1>Warsaw</h1>
    <div class="sub">A field guide</div>
    <form id="f">
      <input id="pin" type="password" inputmode="numeric" autocomplete="off" placeholder="PIN" aria-label="PIN" autofocus/>
      <div class="err" id="err"></div>
      <button id="go" type="submit">Unlock</button>
      <label class="rem"><input type="checkbox" id="rem" checked/> Remember on this device</label>
    </form>
    <div class="hint">Private guide. Enter your PIN to open.</div>
  </div>

const b642bytes=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function decrypt(pin){
  const enc=new TextEncoder();
  const base=await crypto.subtle.importKey("raw",enc.encode(pin),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b642bytes(SALT),iterations:ITER,hash:"SHA-256"},base,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b642bytes(IV)},key,b642bytes(CT));
  return new TextDecoder().decode(pt);
}
function load(html){document.open();document.write(html);document.close();}
async function tryPin(pin,remember){
  const html=await decrypt(pin); // throws on wrong PIN
  if(remember){try{localStorage.setItem("wg_pin",pin);}catch(e){}}
  load(html);
}
const f=document.getElementById("f"),err=document.getElementById("err"),go=document.getElementById("go"),pinEl=document.getElementById("pin");
f.addEventListener("submit",async e=>{
  e.preventDefault();err.textContent="";go.disabled=true;go.textContent="Unlocking…";
  try{await tryPin(pinEl.value.trim(),document.getElementById("rem").checked);}
  catch(_){err.textContent="Wrong PIN. Try again.";go.disabled=false;go.textContent="Unlock";pinEl.value="";pinEl.focus();}
});
// auto-unlock if remembered on this device
(async()=>{let saved;try{saved=localStorage.getItem("wg_pin");}catch(e){}
  if(saved){try{await tryPin(saved,false);}catch(_){try{localStorage.removeItem("wg_pin");}catch(e){}}}
})();
